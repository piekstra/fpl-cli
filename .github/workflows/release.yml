name: release

# Cut a release by pushing a tag like `v0.1.0`. Builds per-platform tarballs
# named `fpl-<target-triple>.tar.gz` (what `fpl update` looks for) and attaches
# them to the GitHub Release.
on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    name: build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Install Linux keychain deps
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libdbus-1-dev pkg-config
      - name: Build
        run: cargo build --release --target ${{ matrix.target }}
      - name: Package
        run: |
          tar -C target/${{ matrix.target }}/release -czf fpl-${{ matrix.target }}.tar.gz fpl
          shasum -a 256 fpl-${{ matrix.target }}.tar.gz > fpl-${{ matrix.target }}.tar.gz.sha256
      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            fpl-${{ matrix.target }}.tar.gz
            fpl-${{ matrix.target }}.tar.gz.sha256
